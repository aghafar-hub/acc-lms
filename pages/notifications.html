<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="notifications.title">Notifications — ACC LMS</title>
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/print.css" media="print">
  <meta name="theme-color" content="#1E2B5E">
  <style>
    .notif-list { display: flex; flex-direction: column; gap: 0; }
    .notif-item { display: flex; align-items: flex-start; gap: var(--space-4); padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-border); cursor: pointer; transition: background 0.15s; position: relative; }
    .notif-item:hover { background: var(--color-surface-overlay); }
    .notif-item:last-child { border-bottom: none; }
    .notif-item--unread { background: rgba(38, 53, 128, 0.04); }
    .notif-item--unread::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--color-brand-navy); border-radius:0 2px 2px 0; }
    .notif-icon { width: 40px; height: 40px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-icon--critical { background: var(--color-critical-bg); color: var(--color-critical); }
    .notif-icon--high     { background: var(--color-high-bg);     color: var(--color-high); }
    .notif-icon--medium   { background: var(--color-info-bg);     color: var(--color-info); }
    .notif-icon--low      { background: var(--color-approved-bg); color: var(--color-approved); }
    .notif-icon--info     { background: var(--color-surface-overlay); color: var(--color-text-muted); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-primary); margin-bottom: 3px; }
    .notif-message { font-size: var(--text-sm); color: var(--color-text-secondary); line-height: 1.5; }
    .notif-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: 6px; }
    .notif-time { font-size: var(--text-xs); color: var(--color-text-muted); }
    .notif-actions { display: flex; gap: var(--space-2); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .notif-item:hover .notif-actions { opacity: 1; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-brand-navy); flex-shrink: 0; margin-top: 6px; }
    .notif-header-bar { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-5); border-bottom: 1px solid var(--color-border); background: var(--color-surface-overlay); }
    .notif-count-text { font-size: var(--text-sm); color: var(--color-text-secondary); }
    .notif-empty { padding: var(--space-10); text-align: center; }
    .notif-group-header { padding: var(--space-2) var(--space-5); background: var(--color-surface-overlay); font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--color-border); }
  </style>
</head>
<body>
  <div class="app-layout" id="appLayout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="app-header" id="appHeader"></header>
      <main class="main-content">

        <div class="page-header">
          <div class="page-header-left">
            <h1 class="page-title" data-i18n="notifications.pageTitle">Notifications</h1>
            <p class="page-subtitle" data-i18n="notifications.pageSubtitle">System alerts, approvals, and escalations</p>
          </div>
          <div class="page-header-actions">
            <button class="btn btn-ghost" id="btnMarkAllRead" data-i18n="notifications.markAllRead">Mark All Read</button>
            <button class="btn btn-ghost btn-sm" id="btnRefresh">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
          </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar card" style="margin-bottom:var(--space-4)">
          <div class="filter-row">
            <div class="filter-field">
              <label class="filter-label" data-i18n="common.status">Read Status</label>
              <select id="readFilter" class="form-select">
                <option value="">All</option>
                <option value="unread">Unread</option>
                <option value="read">Read</option>
              </select>
            </div>
            <div class="filter-field">
              <label class="filter-label" data-i18n="common.priority">Priority</label>
              <select id="priorityFilter" class="form-select">
                <option value="">All Priorities</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
              </select>
            </div>
            <div class="filter-field filter-field--grow">
              <label class="filter-label">Type</label>
              <select id="typeFilter" class="form-select">
                <option value="">All Types</option>
                <option value="SUBMISSION">Submissions</option>
                <option value="APPROVAL">Approvals</option>
                <option value="REJECTION">Rejections</option>
                <option value="OVERDUE">Overdue Alerts</option>
                <option value="OIL_REQUIRED">Oil Change Required</option>
                <option value="SYSTEM">System</option>
              </select>
            </div>
            <button class="btn btn-ghost btn-sm" id="btnReset" data-i18n="common.reset">Reset</button>
          </div>
        </div>

        <!-- Notification Feed -->
        <div class="card card--flush">
          <div class="notif-header-bar">
            <span class="notif-count-text" id="notifCountText">Loading…</span>
            <div style="display:flex;gap:var(--space-2)">
              <button class="btn btn-ghost btn-xs" id="btnDeleteRead" data-i18n="notifications.deleteRead">Delete Read</button>
            </div>
          </div>

          <div id="notifFeed">
            <div class="table-loading" style="padding:var(--space-8)">
              <div class="spinner"></div><span>Loading notifications…</span>
            </div>
          </div>

          <!-- Pagination -->
          <div class="table-footer" id="tableFooter">
            <span id="pageInfo"></span>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <div class="search-overlay" id="searchOverlay" hidden></div>

  <script src="../js/core.js"></script>
  <script src="../js/shell.js"></script>
  <script>
  (function() {
    'use strict';

    let state = {
      notifications: [], filtered: [], page: 1, pageSize: 30,
      filters: { read: '', priority: '', type: '' }
    };

    const TYPE_ICONS = {
      SUBMISSION:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
      APPROVAL:     `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
      REJECTION:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      OVERDUE:      `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      OIL_REQUIRED: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>`,
      SYSTEM:       `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>`,
    };

    App.init({ requireAuth: true }).then(() => {
      Shell.init();
      setupFilters();
      loadNotifications();
      I18n._rerender();
    });

    async function loadNotifications() {
      document.getElementById('notifFeed').innerHTML = `<div class="table-loading" style="padding:var(--space-8)"><div class="spinner"></div><span>Loading…</span></div>`;
      const res = await API.getNotifications();
      if (!res.success) { Toast.show(res.error || 'Failed to load', 'error'); return; }
      state.notifications = res.data || [];
      applyFilters();
      updateBadge();
    }

    function applyFilters() {
      let rows = [...state.notifications];
      const { read, priority, type } = state.filters;
      if (read === 'unread') rows = rows.filter(n => !n.IsRead);
      if (read === 'read')   rows = rows.filter(n =>  n.IsRead);
      if (priority) rows = rows.filter(n => n.Priority === priority);
      if (type)     rows = rows.filter(n => n.Type === type);

      state.filtered = rows;
      state.page = 1;
      renderFeed();
    }

    function renderFeed() {
      const feed = document.getElementById('notifFeed');
      const total = state.filtered.length;
      const unread = state.filtered.filter(n => !n.IsRead).length;
      const start = (state.page-1)*state.pageSize;
      const rows = state.filtered.slice(start, start+state.pageSize);

      document.getElementById('notifCountText').textContent = `${total} notifications · ${unread} unread`;
      document.getElementById('pageInfo').textContent = total > 0 ? `${start+1}–${Math.min(start+state.pageSize,total)} of ${total}` : '';

      if (!rows.length) {
        feed.innerHTML = `<div class="notif-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <p style="color:var(--color-text-muted);margin-top:var(--space-3)">No notifications</p>
        </div>`;
        renderPagination(total);
        return;
      }

      // Group by date
      const groups = {};
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now()-86400000).toDateString();
      rows.forEach(n => {
        const d = new Date(n.CreatedAt);
        let label = d.toDateString();
        if (label === today) label = 'Today';
        else if (label === yesterday) label = 'Yesterday';
        else label = I18n.formatDate(n.CreatedAt);
        if (!groups[label]) groups[label] = [];
        groups[label].push(n);
      });

      feed.innerHTML = Object.entries(groups).map(([label, notifs]) =>
        `<div class="notif-group-header">${label}</div>` +
        `<div class="notif-list">` +
        notifs.map(n => notifItemHTML(n)).join('') +
        `</div>`
      ).join('');

      renderPagination(total);
    }

    function notifItemHTML(n) {
      const priority = (n.Priority || 'info').toLowerCase();
      const icon = TYPE_ICONS[n.Type] || TYPE_ICONS.SYSTEM;
      const timeStr = I18n.timeAgo(n.CreatedAt);
      return `<div class="notif-item ${n.IsRead?'':'notif-item--unread'}" data-id="${n.NotificationID}" onclick="handleNotifClick('${n.NotificationID}','${n.RelatedID||''}','${n.RelatedType||''}')">
        ${!n.IsRead ? '<div class="unread-dot"></div>' : '<div style="width:8px;flex-shrink:0"></div>'}
        <div class="notif-icon notif-icon--${priority}">${icon}</div>
        <div class="notif-body">
          <div class="notif-title">${escHtml(n.Title||n.Type||'Notification')}</div>
          <div class="notif-message">${escHtml(n.Message||'')}</div>
          <div class="notif-meta">
            <span class="notif-time">${timeStr}</span>
            <span class="badge badge--crit-${priority} badge--sm">${n.Priority||'INFO'}</span>
            <span class="badge badge--sm" style="background:var(--color-surface-overlay);color:var(--color-text-muted)">${n.Type||''}</span>
          </div>
        </div>
        <div class="notif-actions">
          ${!n.IsRead ? `<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();markRead('${n.NotificationID}')" title="Mark read">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </button>` : ''}
          <button class="btn btn-ghost btn-xs btn--danger" onclick="event.stopPropagation();deleteNotif('${n.NotificationID}')" title="Delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>`;
    }

    function escHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

    window.handleNotifClick = async function(id, relatedId, relatedType) {
      await markRead(id);
      if (!relatedId) return;
      // Navigate to related item
      const routes = { HISTORY: 'history.html', ANALYSIS: 'analysis.html', CORRECTIONS: 'pending.html', POINTS: 'points.html' };
      const page = routes[relatedType];
      if (page) window.location.href = `${page}?id=${relatedId}`;
    };

    window.markRead = async function(id) {
      const res = await API.markNotificationRead(id);
      if (res.success) {
        const n = state.notifications.find(x => x.NotificationID === id);
        if (n) { n.IsRead = true; applyFilters(); updateBadge(); }
      }
    };

    window.deleteNotif = async function(id) {
      // FIX: there is no 'delete' action on the backend, only 'dismiss'.
      // The original code's optional-chaining fallback meant this always
      // silently no-opped (UI showed success, but nothing was ever
      // actually removed server-side). Using the real backend action now.
      const res = await API.get('notifications.dismiss', { notifId: id });
      if (res.success) {
        state.notifications = state.notifications.filter(n => n.NotificationID !== id);
        applyFilters();
        updateBadge();
        Toast.show('Notification deleted','success');
      }
    };

    function updateBadge() {
      const unread = state.notifications.filter(n => !n.IsRead).length;
      EventBus.emit('notification:count', unread);
    }

    document.getElementById('btnMarkAllRead').addEventListener('click', async () => {
      const unreadIds = state.notifications.filter(n => !n.IsRead).map(n => n.NotificationID);
      if (!unreadIds.length) return;
      // Mark each (batch would be better but works for now)
      await Promise.all(unreadIds.map(id => API.markNotificationRead(id)));
      state.notifications.forEach(n => n.IsRead = true);
      applyFilters(); updateBadge();
      Toast.show(`${unreadIds.length} notifications marked as read`, 'success');
    });

    document.getElementById('btnDeleteRead').addEventListener('click', async () => {
      if (!confirm('Delete all read notifications?')) return;
      state.notifications = state.notifications.filter(n => !n.IsRead);
      applyFilters(); updateBadge();
      Toast.show('Read notifications deleted', 'success');
    });

    document.getElementById('btnRefresh').addEventListener('click', loadNotifications);

    function renderPagination(total) {
      const pg = document.getElementById('pagination');
      const pages = Math.ceil(total/state.pageSize);
      pg.innerHTML = '';
      if (pages <= 1) return;
      const mk = (l,p,d,a) => { const b=document.createElement('button'); b.className=`pagination-btn${a?' pagination-btn--active':''}`; b.textContent=l; b.disabled=d; b.onclick=()=>{state.page=p;renderFeed();}; return b; };
      pg.appendChild(mk('‹',state.page-1,state.page===1,false));
      for(let i=1;i<=pages;i++) pg.appendChild(mk(i,i,false,i===state.page));
      pg.appendChild(mk('›',state.page+1,state.page===pages,false));
    }

    function setupFilters() {
      document.getElementById('readFilter').addEventListener('change', e=>{state.filters.read=e.target.value;applyFilters();});
      document.getElementById('priorityFilter').addEventListener('change', e=>{state.filters.priority=e.target.value;applyFilters();});
      document.getElementById('typeFilter').addEventListener('change', e=>{state.filters.type=e.target.value;applyFilters();});
      document.getElementById('btnReset').addEventListener('click', () => {
        state.filters={read:'',priority:'',type:''};
        document.querySelectorAll('#readFilter,#priorityFilter,#typeFilter').forEach(el=>el.value='');
        applyFilters();
      });
    }

  })();
  </script>
</body>
</html>
