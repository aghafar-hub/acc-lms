<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lubrication Points — ACC LMS</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="icon" type="image/png" href="../assets/logo.png">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content" id="main-content">
    <header class="app-header" id="app-header"></header>

    <main class="page-content">

      <!-- Page Header -->
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-6);">
        <div>
          <h2 class="text-2xl font-bold" data-i18n="points.title">Lubrication Points</h2>
          <p class="text-sm text-muted" id="points-count">Loading...</p>
        </div>
        <div class="flex gap-3" id="page-actions">
          <!-- Populated by role -->
        </div>
      </div>

      <!-- Toolbar -->
      <div class="card" style="margin-bottom:var(--space-4);">
        <div class="filter-bar">
          <!-- Search -->
          <div class="search-wrapper flex-1" style="min-width:200px;max-width:360px;">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/>
            </svg>
            <input type="text" class="form-control search-input" id="points-search"
              placeholder="Search point, asset, location..." data-i18n-placeholder="points.search">
          </div>

          <!-- Filters -->
          <div class="flex gap-2 flex-wrap" id="quick-filters">
            <button class="filter-chip active" data-filter="">All</button>
            <button class="filter-chip" data-filter="overdue">⏰ Overdue</button>
            <button class="filter-chip" data-filter="critical">🔴 Critical</button>
            <button class="filter-chip" data-filter="oil_required">🛢 Oil Required</button>
            <button class="filter-chip" data-filter="due_this_week">📅 Due This Week</button>
          </div>

          <!-- Area filter -->
          <select class="form-control" id="area-filter" style="width:auto;max-width:160px;">
            <option value="">All Areas</option>
          </select>

          <!-- View toggle -->
          <div class="flex gap-1">
            <button class="btn-icon active" id="view-table" title="Table view">☰</button>
            <button class="btn-icon" id="view-cards" title="Card view">⊞</button>
          </div>
        </div>
      </div>

      <!-- Points Table -->
      <div class="card" id="points-table-wrapper">
        <div class="data-table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Point ID</th>
                <th>Asset</th>
                <th>Location</th>
                <th>Criticality</th>
                <th>Last Change</th>
                <th>Next Change</th>
                <th>Lubricant</th>
                <th>Status</th>
                <th class="col-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="points-tbody">
              <tr><td colspan="9" style="text-align:center;padding:40px;">
                <div class="spinner" style="margin:0 auto 12px;"></div>
                <div class="text-muted text-sm">Loading points...</div>
              </td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="card-footer flex items-center justify-between">
          <div class="text-sm text-muted" id="pagination-info">—</div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Point Detail Modal -->
<div class="modal-overlay" id="point-detail-modal" style="display:none;">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <h3 class="modal-title" id="modal-point-id">Point Details</h3>
        <div class="text-sm text-muted" id="modal-point-asset"></div>
      </div>
      <button class="btn-icon" onclick="Modal.close('point-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="modal-point-body">Loading...</div>
    <div class="modal-footer" id="modal-point-footer"></div>
  </div>
</div>

<!-- Add/Edit Point Modal -->
<div class="modal-overlay" id="point-edit-modal" style="display:none;">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 class="modal-title" id="edit-modal-title">Add Point</h3>
      <button class="btn-icon" onclick="Modal.close('point-edit-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="point-form" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
        <div class="form-group">
          <label class="form-label required">Location</label>
          <select class="form-control" id="ef-location" required>
            <option value="">Select location...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label required">Asset Code</label>
          <input type="text" class="form-control" id="ef-asset-code" placeholder="e.g. 431.MD140" required>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label required">Asset Name</label>
          <input type="text" class="form-control" id="ef-asset-name" placeholder="Asset description" required>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label required">Lubrication Point</label>
          <input type="text" class="form-control" id="ef-point-name" placeholder="e.g. Geared Motor" required>
        </div>
        <div class="form-group">
          <label class="form-label required">Frequency</label>
          <select class="form-control" id="ef-frequency" required>
            <option value="">Select frequency...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label required">Criticality</label>
          <select class="form-control" id="ef-criticality" required>
            <option value="">Select...</option>
            <option value="CRITICAL">Critical</option>
            <option value="HIGH">High</option>
            <option value="MEDIUM">Medium</option>
            <option value="LOW">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label required">Lubricant</label>
          <select class="form-control" id="ef-lubricant" required>
            <option value="">Select lubricant...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity (L)</label>
          <input type="number" class="form-control" id="ef-qty" step="0.1" min="0" placeholder="Litres">
        </div>
        <div class="form-group">
          <label class="form-label">Operating Temp (°C)</label>
          <input type="number" class="form-control" id="ef-temp" placeholder="°C">
        </div>
        <div class="form-group">
          <label class="form-label">Number of Points</label>
          <input type="number" class="form-control" id="ef-num-points" min="1" value="1">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Remarks</label>
          <textarea class="form-control" id="ef-remarks" rows="2" placeholder="Optional notes..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('point-edit-modal')">Cancel</button>
      <button class="btn btn-primary" id="ef-save-btn" onclick="PointsPage.savePoint()">Save Point</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="../js/core.js"></script>
<script src="../js/shell.js"></script>
<script>
const PointsPage = {
  _page: 1,
  _perPage: 25,
  _total: 0,
  _filter: '',
  _search: '',
  _area: '',
  _data: [],
  _editId: null,

  async init() {
    await App.init();
    await Shell.init();

    const role = Auth.getRole();

    // Role-based actions
    if (Auth.can('points.create')) {
      document.getElementById('page-actions').innerHTML = `
        <button class="btn btn-primary" onclick="PointsPage.openAdd()">+ Add Point</button>
      `;
    }

    // Load filter options
    await this.loadFilterOptions();

    // Quick filter chips
    document.querySelectorAll('#quick-filters .filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#quick-filters .filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        this._filter = chip.dataset.filter;
        this._page = 1;
        this.load();
      });
    });

    // Search debounce
    let searchTimer;
    document.getElementById('points-search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        this._search = e.target.value.trim();
        this._page = 1;
        this.load();
      }, 400);
    });

    // Area filter
    document.getElementById('area-filter').addEventListener('change', e => {
      this._area = e.target.value;
      this._page = 1;
      this.load();
    });

    // Check URL params for filter
    const urlParams = new URLSearchParams(window.location.search);
    const urlFilter = urlParams.get('filter') || '';
    if (urlFilter) {
      this._filter = urlFilter;
      document.querySelectorAll('#quick-filters .filter-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.filter === urlFilter);
      });
    }

    await this.load();
  },

  async load() {
    const tbody = document.getElementById('points-tbody');
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:32px;">
      <div class="spinner" style="margin:0 auto 8px;"></div>
      <div class="text-muted text-sm">Loading...</div>
    </td></tr>`;

    const params = {
      page: this._page,
      perPage: this._perPage,
      search: this._search,
      filter: this._filter,
      areaId: this._area,
    };

    const res = await API.getPoints(params);

    if (!res.success) {
      tbody.innerHTML = `<tr><td colspan="9">${DOM.emptyState(I18n.t('error.api_not_configured'), '⚙')}</td></tr>`;
      return;
    }

    this._data = res.data?.rows || [];
    this._total = res.data?.total || 0;

    document.getElementById('points-count').textContent =
      `${Format.number(this._total)} points`;

    this.renderTable();
    this.renderPagination();
  },

  renderTable() {
    const tbody = document.getElementById('points-tbody');
    const role = Auth.getRole();

    if (!this._data.length) {
      tbody.innerHTML = `<tr><td colspan="9">${DOM.emptyState('No lubrication points found', '⚙️')}</td></tr>`;
      return;
    }

    tbody.innerHTML = this._data.map(p => {
      const overdueClass = p.DaysOverdue > 0 ? `style="color:var(--color-rejected);font-weight:600;"` : '';
      const nextDateStr = p.DaysOverdue > 0
        ? `<span ${overdueClass}>${p.DaysOverdue}d overdue</span>`
        : I18n.formatDate(p.NextOilChangeDate);

      const statusIndicators = [];
      if (p.OilChangeRequired) statusIndicators.push('<span class="badge badge-critical">Oil Change</span>');
      if (p.IsActive === false) statusIndicators.push('<span class="badge badge-rejected">Inactive</span>');
      if (!statusIndicators.length) statusIndicators.push('<span class="badge badge-approved">Active</span>');

      const actions = `
        <button class="btn btn-ghost btn-sm" onclick="PointsPage.viewPoint('${p.PointID}')" title="View">👁</button>
        ${Auth.can('points.update') ? `<button class="btn btn-ghost btn-sm" onclick="PointsPage.openEdit('${p.PointID}')" title="Edit">✏️</button>` : ''}
        ${Auth.can('history.create') ? `<button class="btn btn-primary btn-sm" onclick="PointsPage.quickSubmit('${p.PointID}')" title="Submit oil change">+</button>` : ''}
      `;

      return `
        <tr>
          <td><span style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--color-brand-navy)">${p.PointID}</span></td>
          <td>
            <div class="text-sm font-medium truncate" style="max-width:180px;">${p.AssetName || '—'}</div>
            <div class="text-xs text-muted">${p.AssetCode || ''}</div>
          </td>
          <td>
            <div class="text-sm">${p.LocationCode || '—'}</div>
            <div class="text-xs text-muted">${p.AreaNameEN || ''}</div>
          </td>
          <td>${Format.criticalityBadge(p.Criticality)}</td>
          <td class="text-sm">${I18n.formatDate(p.LastChangeDate)}</td>
          <td class="text-sm">${nextDateStr}</td>
          <td class="text-sm truncate" style="max-width:140px;" title="${p.LubricantName || ''}">${p.LubricantName || '—'}</td>
          <td>${statusIndicators.join(' ')}</td>
          <td class="col-actions">${actions}</td>
        </tr>
      `;
    }).join('');
  },

  renderPagination() {
    const totalPages = Math.ceil(this._total / this._perPage);
    const pagination = document.getElementById('pagination');
    const info = document.getElementById('pagination-info');

    const start = (this._page - 1) * this._perPage + 1;
    const end   = Math.min(this._page * this._perPage, this._total);
    info.textContent = `Showing ${start}–${end} of ${Format.number(this._total)}`;

    if (totalPages <= 1) { pagination.innerHTML = ''; return; }

    let pages = [];
    pages.push(`<button class="page-btn" ${this._page === 1 ? 'disabled' : ''} onclick="PointsPage.goPage(${this._page - 1})">◀</button>`);

    const range = this._getPageRange(this._page, totalPages);
    range.forEach(p => {
      if (p === '...') {
        pages.push(`<span class="page-btn" style="border:none;pointer-events:none;">…</span>`);
      } else {
        pages.push(`<button class="page-btn ${p === this._page ? 'active' : ''}" onclick="PointsPage.goPage(${p})">${p}</button>`);
      }
    });

    pages.push(`<button class="page-btn" ${this._page === totalPages ? 'disabled' : ''} onclick="PointsPage.goPage(${this._page + 1})">▶</button>`);
    pagination.innerHTML = pages.join('');
  },

  _getPageRange(current, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
    if (current <= 4) return [1, 2, 3, 4, 5, '...', total];
    if (current >= total - 3) return [1, '...', total-4, total-3, total-2, total-1, total];
    return [1, '...', current-1, current, current+1, '...', total];
  },

  goPage(p) {
    this._page = p;
    this.load();
    window.scrollTo(0, 0);
  },

  async loadFilterOptions() {
    // Areas
    const areaRes = await API.getAreas();
    if (areaRes.success) {
      const select = document.getElementById('area-filter');
      (areaRes.data || []).forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.AreaID;
        opt.textContent = I18n.getLang() === 'ar' ? a.AreaNameAR : a.AreaNameEN;
        select.appendChild(opt);
      });
    }

    // Locations for edit form
    const locRes = await API.getLocations();
    if (locRes.success) {
      const select = document.getElementById('ef-location');
      (locRes.data || []).forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.LocationID;
        opt.textContent = `${l.LocationCode} — ${l.LocationNameEN}`;
        select.appendChild(opt);
      });
    }

    // Frequency codes
    const freqRes = await API.getFrequencyCodes();
    if (freqRes.success) {
      const select = document.getElementById('ef-frequency');
      (freqRes.data || []).forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.FrequencyCode;
        opt.textContent = `${f.FrequencyCode} (${f.Description || ''})`;
        select.appendChild(opt);
      });
    }

    // Lubricants
    const lubRes = await API.getLubricants();
    if (lubRes.success) {
      const select = document.getElementById('ef-lubricant');
      (lubRes.data || []).forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.LubricantID;
        opt.textContent = `${l.ProductName} (${l.Brand})`;
        select.appendChild(opt);
      });
    }
  },

  async viewPoint(pointId) {
    Modal.show('point-detail-modal');
    document.getElementById('modal-point-body').innerHTML =
      `<div class="text-center" style="padding:32px;"><div class="spinner" style="margin:0 auto;"></div></div>`;

    const res = await API.getPoint(pointId);
    if (!res.success) {
      document.getElementById('modal-point-body').innerHTML = `<div class="alert alert-danger">Failed to load point</div>`;
      return;
    }

    const p = res.data;
    document.getElementById('modal-point-id').textContent = p.PointID;
    document.getElementById('modal-point-asset').textContent = `${p.AssetCode} — ${p.AssetName}`;

    document.getElementById('modal-point-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
        ${this._detailRow('Location', `${p.LocationCode} — ${p.LocationNameEN}`)}
        ${this._detailRow('Criticality', Format.criticalityBadge(p.Criticality))}
        ${this._detailRow('Lubrication Point', p.LubricationPoint)}
        ${this._detailRow('Frequency', Format.frequency(p.FrequencyCode))}
        ${this._detailRow('Lubricant', p.LubricantName)}
        ${this._detailRow('Brand', p.LubricantBrand)}
        ${this._detailRow('Quantity (L)', p.QuantityLiters || '—')}
        ${this._detailRow('Op. Temp (°C)', p.OperatingTemp || '—')}
        ${this._detailRow('Last Change', I18n.formatDate(p.LastChangeDate))}
        ${this._detailRow('Next Change', I18n.formatDate(p.NextOilChangeDate))}
        ${this._detailRow('Oil Change Required', p.OilChangeRequired ? '<span class="badge badge-critical">Yes</span>' : '<span class="badge badge-approved">No</span>')}
        ${this._detailRow('Status', p.IsActive ? '<span class="badge badge-approved">Active</span>' : '<span class="badge badge-rejected">Inactive</span>')}
      </div>
      ${p.Remarks ? `<div class="alert alert-info" style="margin-top:16px;"><strong>Remarks:</strong> ${p.Remarks}</div>` : ''}
    `;

    const footerBtns = [];
    if (Auth.can('history.create')) {
      footerBtns.push(`<button class="btn btn-primary" onclick="PointsPage.quickSubmit('${p.PointID}');Modal.close('point-detail-modal');">Submit Oil Change</button>`);
    }
    if (Auth.can('points.update')) {
      footerBtns.push(`<button class="btn btn-secondary" onclick="PointsPage.openEdit('${p.PointID}');Modal.close('point-detail-modal');">Edit Point</button>`);
    }
    footerBtns.push(`<button class="btn btn-ghost" onclick="Modal.close('point-detail-modal')">Close</button>`);
    document.getElementById('modal-point-footer').innerHTML = footerBtns.join('');
  },

  _detailRow(label, value) {
    return `
      <div>
        <div class="text-xs text-muted font-semibold" style="text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">${label}</div>
        <div class="text-sm font-medium">${value || '—'}</div>
      </div>
    `;
  },

  openAdd() {
    this._editId = null;
    document.getElementById('edit-modal-title').textContent = 'Add Lubrication Point';
    document.getElementById('point-form').reset();
    Modal.show('point-edit-modal');
  },

  async openEdit(pointId) {
    this._editId = pointId;
    document.getElementById('edit-modal-title').textContent = `Edit Point — ${pointId}`;
    Modal.show('point-edit-modal');

    const res = await API.getPoint(pointId);
    if (!res.success) { Toast.error('Failed to load point'); return; }

    const p = res.data;
    document.getElementById('ef-location').value  = p.LocationID || '';
    document.getElementById('ef-asset-code').value = p.AssetCode || '';
    document.getElementById('ef-asset-name').value = p.AssetName || '';
    document.getElementById('ef-point-name').value = p.LubricationPoint || '';
    document.getElementById('ef-frequency').value  = p.FrequencyCode || '';
    document.getElementById('ef-criticality').value= p.Criticality || '';
    document.getElementById('ef-lubricant').value  = p.LubricantID || '';
    document.getElementById('ef-qty').value        = p.QuantityLiters || '';
    document.getElementById('ef-temp').value       = p.OperatingTemp || '';
    document.getElementById('ef-num-points').value = p.NumberOfPoints || 1;
    document.getElementById('ef-remarks').value    = p.Remarks || '';
  },

  async savePoint() {
    const btn = document.getElementById('ef-save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const data = {
      LocationID:       document.getElementById('ef-location').value,
      AssetCode:        document.getElementById('ef-asset-code').value.trim(),
      AssetName:        document.getElementById('ef-asset-name').value.trim(),
      LubricationPoint: document.getElementById('ef-point-name').value.trim(),
      FrequencyCode:    document.getElementById('ef-frequency').value,
      Criticality:      document.getElementById('ef-criticality').value,
      LubricantID:      document.getElementById('ef-lubricant').value,
      QuantityLiters:   parseFloat(document.getElementById('ef-qty').value) || null,
      OperatingTemp:    parseFloat(document.getElementById('ef-temp').value) || null,
      NumberOfPoints:   parseInt(document.getElementById('ef-num-points').value) || 1,
      Remarks:          document.getElementById('ef-remarks').value.trim(),
    };

    let res;
    if (this._editId) {
      res = await API.updatePoint(this._editId, data);
    } else {
      res = await API.createPoint(data);
    }

    btn.disabled = false;
    btn.textContent = 'Save Point';

    if (res.success) {
      Toast.success(I18n.t('msg.saved'));
      Modal.close('point-edit-modal');
      await this.load();
    } else {
      Toast.error(res.error || I18n.t('error.generic'));
    }
  },

  quickSubmit(pointId) {
    const modalId = Modal.create({
      title: 'Submit Oil Change',
      size: 'modal-sm',
      body: `
        <form id="qs-modal-form" style="display:flex;flex-direction:column;gap:16px;">
          <div class="form-group">
            <label class="form-label">Point ID</label>
            <input type="text" class="form-control" value="${pointId}" readonly style="background:var(--color-bg);">
          </div>
          <div class="form-group">
            <label class="form-label required">Change Date</label>
            <input type="date" class="form-control" id="qs-m-date" value="${new Date().toISOString().split('T')[0]}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Oil Quantity Used (L)</label>
            <input type="number" class="form-control" id="qs-m-qty" step="0.1" min="0" placeholder="Litres">
          </div>
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="qs-m-notes" rows="2" placeholder="Optional notes..."></textarea>
          </div>
        </form>
      `,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close('${modalId}')">Cancel</button>
        <button class="btn btn-primary" onclick="PointsPage.doQuickSubmit('${pointId}','${modalId}')">Submit</button>
      `,
    });
  },

  async doQuickSubmit(pointId, modalId) {
    const date  = document.getElementById('qs-m-date').value;
    const qty   = document.getElementById('qs-m-qty').value;
    const notes = document.getElementById('qs-m-notes').value;

    if (!date) { Toast.warning('Change date is required'); return; }

    const res = await API.submitOilChange({
      PointID: pointId,
      ChangeDate: date,
      OilQuantityUsed: qty ? parseFloat(qty) : null,
      Notes: notes,
    });

    if (res.success) {
      Toast.success(I18n.t('msg.submitted'));
      Modal.close(modalId);
      await this.load();
    } else {
      Toast.error(res.error || I18n.t('error.generic'));
    }
  },
};

PointsPage.init();
</script>
</body>
</html>
